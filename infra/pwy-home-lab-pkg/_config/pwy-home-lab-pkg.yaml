      _unit_purpose: 'Deployed (ms01-02): Polls MaaS until the machine reaches Deployed state (OS fully installed and running). Runs a power-on watchdog every 5 minutes to recover machines that power off mid-install. Optionally SSH-verifies the public IP. On Terraform destroy, releases the machine back to Ready.'
      _wave: maas.lifecycle.deployed
