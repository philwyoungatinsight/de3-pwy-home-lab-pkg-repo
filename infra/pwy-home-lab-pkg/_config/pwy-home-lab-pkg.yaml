      _wave: maas.lifecycle.deployed
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/pxe-test-vm-1:
      _unit_purpose: 'MaaS machine entry for the PXE pipeline validation VM. Power driver: Proxmox API on pve-1. Deploying Ubuntu 24.04 validates DHCP, PXE boot, commissioning, and OS deployment through the full MaaS pipeline.'
      _wave: maas.test.proxmox-vms
      cloud_init_user: ubuntu
      deploy_distro: noble
      power_address: 10.0.10.115
      power_type: proxmox
      power_vm_name: pxe-test-vm-1
      release_erase: false
      skip_ssh_check: true
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/pxe-test-vm-1/commission:
      _unit_purpose: 'Commissioning (pxe-test-vm-1): MaaS PXE-boots the Proxmox test VM into a minimal environment, discovers its hardware, and records the inventory. Short-circuits if machine is already Ready or beyond. Used to validate the full MaaS lifecycle pipeline without physical hardware.'
      _wave: maas.lifecycle.commissioning
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/pxe-test-vm-1/commission/ready:
      _unit_purpose: 'Ready (pxe-test-vm-1): Waits for MaaS to confirm the Proxmox test VM reached Ready state after commissioning. Configures network interfaces once Ready. Short-circuits if machine is already Allocated, Deploying, or Deployed.'
      _wave: maas.lifecycle.ready
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/pxe-test-vm-1/commission/ready/allocated:
      _unit_purpose: 'Allocated (pxe-test-vm-1): Reserves the Ready Proxmox test VM for this deployment. Sets the target OS/distro on the machine record. Short-circuits if already Allocated or beyond.'
      _wave: maas.lifecycle.allocated
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/pxe-test-vm-1/commission/ready/allocated/deploying:
      _unit_purpose: 'Deploying (pxe-test-vm-1): Triggers OS installation on the Proxmox test VM — MaaS writes the OS image to the VM disk, injects cloud-init user-data, and reboots into the installed OS. Short-circuits if already Deploying or Deployed.'
      _wave: maas.lifecycle.deploying
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/pxe-test-vm-1/commission/ready/allocated/deploying/deployed:
      _unit_purpose: 'Deployed (pxe-test-vm-1): Polls MaaS until the Proxmox test VM reaches Deployed state. Runs a power-on watchdog to recover the VM if it powers off mid-install. On Terraform destroy, releases the VM back to Ready.'
      _wave: maas.lifecycle.deployed
    pwy-home-lab-pkg/_stack/null/pwy-homelab:
      _env: dev
      _provider: 'null'
      _region: pwy-homelab
    pwy-home-lab-pkg/_stack/null/pwy-homelab/configure-physical-machines:
      _tg_scripts_dir: maas-pkg/_tg_scripts
      _unit_purpose: Commission and deploy all physical machines via MaaS. Aggregating unit for the full machine fleet — downstream units (install-proxmox, update-mesh-central) take a single dep here so adding/removing a machine requires no change to them.
      _wave: maas.machine.config.power
      machine_paths:
      - pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/ms01-01
      - pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/ms01-02
      - pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/ms01-03
    pwy-home-lab-pkg/_stack/null/pwy-homelab/local:
      _wave: local.updates
    pwy-home-lab-pkg/_stack/null/pwy-homelab/local/update-ssh-config:
      _unit_purpose: Writes ~/.ssh/conf.d/dynamic_ssh_config with ProxyJump and hostname entries for all provisioned hosts. Runs last (wave local.updates) so it reflects the fully provisioned state.
    pwy-home-lab-pkg/_stack/null/pwy-homelab/maas/configure-db:
      _modules_dir: maas-pkg/_modules
      _tg_scripts_dir: maas-pkg/_tg_scripts
      _unit_purpose: Configure the MaaS PostgreSQL database VM. Installs PostgreSQL, creates the maasdb database and user, configures remote access for the region controller (10.0.10.11).
      _wave: maas.servers.all
    pwy-home-lab-pkg/_stack/null/pwy-homelab/maas/configure-plain-hosts:
      _tg_scripts_dir: maas-pkg/_tg_scripts
      _unit_purpose: Configure OVS bridges on plain managed hosts (ms01-02 Rocky 9, ms01-03 Ubuntu 24.04) post-deploy. Reads bridges config from pwy-home-lab-pkg.yaml, installs openvswitch, and writes persistent NIC + IP config (netplan for Ubuntu, nmcli for Rocky). SSH via provisioning_ip + MaaS jump box (provisioning VLAN 10.0.12.x is not directly routable). Skipped on clean.
      _wave: maas.machine.config.networking
    pwy-home-lab-pkg/_stack/null/pwy-homelab/maas/configure-rack:
      _modules_dir: maas-pkg/_modules
      _tg_scripts_dir: maas-pkg/_tg_scripts
      _unit_purpose: Configure the MaaS rack controller VM. Configures provisioning NIC (static 10.0.12.2), installs MaaS snap (rack only), joins the region controller, configures IP forwarding and NAT masquerade, then runs MaaS API networking configuration (subnets, DHCP, reservations) on the region.
      _wave: maas.servers.all
    pwy-home-lab-pkg/_stack/null/pwy-homelab/maas/configure-region:
      _modules_dir: maas-pkg/_modules
      _tg_scripts_dir: maas-pkg/_tg_scripts
      _unit_purpose: Configure the MaaS region controller VM. Installs MaaS snap (region only), creates admin account, imports boot images, configures commissioning scripts, installs smart-plug-proxy, syncs SSH keys to PVE hosts.
      _wave: maas.servers.all
      admin_email: admin@homelab.local
      admin_ssh_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHx+TZoIE4v2qQDhtYDHN/eGFdtl1Pea5j8WUV1klYXT pyoung@CFXL5YHY09
      admin_username: admin
      db_name: maasdb
      db_user: maas
      debian_images:
      - architecture: amd64/generic
        name: custom/trixie
        title: Debian 13 (Trixie)
        url: https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2
      dhcp_reservations:
        ms01-01-pxe:
          fixed_ip: 10.0.12.237
          mac: 38:05:25:31:2f:a3
          network_key: provisioning
        ms01-02-pxe:
          fixed_ip: 10.0.12.239
          mac: 38:05:25:31:81:10
          network_key: provisioning
        ms01-03-pxe:
          fixed_ip: 10.0.12.238
          mac: 38:05:25:31:7f:14
          network_key: provisioning
      managed_networks:
        management:
          dhcp_enabled: false
          dns_servers:
          - 8.8.8.8
          gateway: 10.0.11.1
          subnet: 10.0.11.0/24
          vlan_id: 11
        provisioning:
          dhcp_enabled: true
          dhcp_start: 10.0.12.100
          dhcp_stop: 10.0.12.200
          dns_servers:
          - 10.0.12.2
          gateway: 10.0.12.2
          rack_ip: 10.0.12.2
          subnet: 10.0.12.0/24
          vlan_id: 12
      node_timeout_minutes: 90
      rocky_images:
      - architecture: amd64/generic
        name: custom/rocky-9
        title: Rocky Linux 9
        url: https://dl.rockylinux.org/pub/rocky/9/images/x86_64/Rocky-9-GenericCloud.latest.x86_64.qcow2
      ubuntu_boot_sources:
      - arches:
