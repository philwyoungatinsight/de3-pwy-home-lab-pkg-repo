    pwy-home-lab-pkg/_stack/unifi/pwy-homelab/port-profile:
      _unit_purpose: 'UniFi port profiles. hypervisor_trunk: cloud_public native + pxe_and_mgmt/provisioning/storage tagged — for Proxmox hosts carrying all VLANs. amt_mgmt: management (VLAN 11) native, no tagged — for AMT NICs (static IPs only, no DHCP). pxe_provisioning: provisioning (VLAN 12) native, no tagged — for PXE/data NICs; MaaS serves DHCP here. pxe_provisioning_public: provisioning (VLAN 12) native + cloud_public (VLAN 10) tagged — for single-NIC machines that need PXE boot and a cloud_public VLAN subinterface (e.g. nuc-1). pxe_mgmt_public: legacy profile (VLAN 11 native + VLAN 10 tagged), kept for reference. public_only, storage_only: single-VLAN profiles.'
      port_profiles:
        amt_mgmt:
          forward: customize
          name: AMT Management
          native_vlan: pxe_and_mgmt
          tagged_vlans: []
        hypervisor_trunk:
          forward: customize
          name: Hypervisor Trunk
          native_vlan: cloud_public
          tagged_vlans:
          - pxe_and_mgmt
          - provisioning
          - storage
        public_only:
          forward: customize
          name: Public Only
          native_vlan: cloud_public
          tagged_vlans: []
        pxe_mgmt_public:
          forward: customize
          name: PXE,MGMT,PUBLIC
          native_vlan: pxe_and_mgmt
          tagged_vlans:
          - cloud_public
        pxe_provisioning:
          forward: customize
          name: PXE Provisioning
          native_vlan: provisioning
          tagged_vlans: []
        pxe_provisioning_public:
          forward: customize
          name: PXE Provisioning + Public
          native_vlan: provisioning
          tagged_vlans:
          - cloud_public
        storage_only:
          forward: customize
          name: Storage Only
          native_vlan: storage
          tagged_vlans: []
  ssh_config:
    dynamic_config_path: ~/.ssh/conf.d/dynamic_ssh_config
  waves:
  - description: 'Update the local SSH config (~/.ssh/conf.d/dynamic_ssh_config) with all provisioned hosts from the current Ansible inventory. Writes SSH Host stanzas for every host (HostName, User, ProxyJump where applicable) and ensures ~/.ssh/config includes the dynamic config file at the top. Idempotent and safe to re-run. Runs last so it reflects the full set of provisioned infrastructure.

      '
    name: local.updates
    test_action: reapply
    update_inventory: false
