      _skip_on_build: false
      _unit_purpose: 'MinisForum MS-01 #3. Deployed by MaaS as Ubuntu 24.04. Power: AMT (10.0.11.12, port 16993). Plain managed host at 10.0.10.118. OVS bridge on 10G NIC (MikroTik sfpplus4) for cloud_public — see bridges: below and scripts/ai-only-scripts/configure-plain-host-ovs.'
      _wave: maas.lifecycle.new
