    pwy-home-lab-pkg/_stack/maas/pwy-homelab:
      _browser_url: http://{ansible_host}:5240/MAAS/r/machines
      _env: dev
      _maas_server_cidr_prefix: 24
      _maas_server_ip: 10.0.10.11
      _provider: maas
      _provider_maas_api_url: http://10.0.10.11:5240/MAAS
      _region: pwy-homelab
      _tg_scripts_dir: maas-pkg/_tg_scripts
      maas_api_port: 5240
      maas_host: 10.0.10.11
      provisioning_subnet: 10.0.12.0/24
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/ms01-01:
      _unit_purpose: 'MinisForum MS-01 #1. Deployed by MaaS as Debian 13 (trixie). Power: AMT (10.0.11.10) with mgmt_wake_via_plug: AMT firmware crashes after a few minutes; Tapo P125 smart plug (192.168.1.231) bounces AC power to restore AMT standby before issuing wsman commands. Provisioning IP: 10.0.12.237. Post-deploy becomes Proxmox node ms01-01 at 10.0.10.116.'
      _wave: maas.lifecycle.new
      additional_tags:
      - role_mgmt_group_ms01
      - role_proxmox_server
      amt_address: 10.0.11.10
      amt_port: 16993
      ansible_host: 10.0.12.237
      ansible_ssh_common_args: -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -W %h:%p ubuntu@10.0.12.2"
      cloud_init_ssh_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHx+TZoIE4v2qQDhtYDHN/eGFdtl1Pea5j8WUV1klYXT pyoung@CFXL5YHY09
      cloud_init_user: debian
      cloud_public_ip: 10.0.10.116
      commission_wait_timeout: '1800'
      deploy_distro: trixie
      deploy_osystem: custom
      deploy_wait_timeout: '3600'
      mgmt_wake_via_plug: true
      poll_timeout_secs: 300
      power_type: amt
      provisioning_ip: 10.0.12.237
      pxe_mac_address: 38:05:25:31:2f:a2
      release_erase: true
      skip_ssh_check: true
      smart_plug_host: 192.168.1.231
      smart_plug_type: tapo
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/ms01-01/commission:
      _unit_purpose: 'Commissioning (ms01-01): MaaS PXE-boots the machine into a minimal environment, discovers hardware (CPUs, RAM, disks, NICs), and records the inventory. Short-circuits if machine is already Ready or beyond. Detects stuck-commissioning (machine powered off while MaaS thinks it is running) and aborts before re-triggering.'
      _wave: maas.lifecycle.commissioning
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/ms01-01/commission/ready:
      _unit_purpose: 'Ready (ms01-01): Waits for MaaS to confirm the machine reached Ready state after commissioning. Configures network interfaces (static or DHCP) once Ready. Short-circuits if machine is already Allocated, Deploying, or Deployed.'
      _wave: maas.lifecycle.ready
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/ms01-01/commission/ready/allocated:
      _unit_purpose: 'Allocated (ms01-01): Reserves the Ready machine exclusively for this deployment so no other MaaS consumer can claim it. Sets the target OS/distro on the machine record. Short-circuits if already Allocated or beyond.'
      _wave: maas.lifecycle.allocated
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/ms01-01/commission/ready/allocated/deploying:
      _unit_purpose: 'Deploying (ms01-01): Triggers OS installation — MaaS PXE-boots the machine into the ephemeral installer, writes the OS image to disk, injects cloud-init user-data (SSH keys, users, packages), and reboots into the installed OS. Short-circuits if already Deploying or Deployed.'
      _wave: maas.lifecycle.deploying
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/ms01-01/commission/ready/allocated/deploying/deployed:
      _unit_purpose: 'Deployed (ms01-01): Polls MaaS until the machine reaches Deployed state (OS fully installed and running). Runs a power-on watchdog every 5 minutes to recover machines that power off mid-install. Optionally SSH-verifies the public IP. On Terraform destroy, releases the machine back to Ready.'
      _wave: maas.lifecycle.deployed
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/ms01-02:
      _skip_on_build: false
      _unit_purpose: 'MinisForum MS-01 #2. Deployed by MaaS as Rocky Linux 9. Power: AMT (10.0.11.11, port 16993) + smart plug (Tapo P125, 192.168.2.105) for mgmt_wake_via_plug — AMT loses standby when fully off; precheck bounces plug first to restore standby, then AMT sets PXE boot override. Plain managed host at 10.0.10.117. Provisioning IP: 10.0.12.239 (DHCP on VLAN 12). OVS bridge on 10G NIC (MikroTik sfpplus3) for cloud_public — see bridges: below and scripts/ai-only-scripts/configure-plain-host-ovs.'
      _wave: maas.lifecycle.new
      additional_tags:
      - role_mgmt_group_ms01
      amt_address: 10.0.11.11
      amt_port: 16993
      bridges:
      - comment: cloud_public via OVS on 10G NIC (MikroTik sfpplus3)
        gateway: 10.0.10.1
        host_ip: 10.0.10.117
        host_vlan: null
        name: ovs0
        nic: enp2s0f0np0
        technology: ovs
      cloud_init_ssh_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHx+TZoIE4v2qQDhtYDHN/eGFdtl1Pea5j8WUV1klYXT pyoung@CFXL5YHY09
      cloud_init_user: rocky
      cloud_public_ip: 10.0.10.117
      deploy_distro: rocky-9
      deploy_osystem: custom
      mgmt_wake_via_plug: true
      poll_timeout_secs: 300
      power_type: amt
      provisioning_ip: 10.0.12.239
      pxe_mac_address: 38:05:25:31:81:10
      release_erase: true
      skip_ssh_check: true
      smart_plug_host: 192.168.2.105
      smart_plug_type: tapo
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/ms01-02/commission:
      _unit_purpose: 'Commissioning (ms01-02): MaaS PXE-boots the machine into a minimal environment, discovers hardware (CPUs, RAM, disks, NICs), and records the inventory. Short-circuits if machine is already Ready or beyond. Detects stuck-commissioning (machine powered off while MaaS thinks it is running) and aborts before re-triggering.'
