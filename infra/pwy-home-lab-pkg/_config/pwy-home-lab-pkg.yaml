        technology: ovs
      cloud_init_ssh_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHx+TZoIE4v2qQDhtYDHN/eGFdtl1Pea5j8WUV1klYXT pyoung@CFXL5YHY09
      cloud_init_user: ubuntu
      cloud_public_ip: 10.0.10.118
      deploy_distro: noble
      deploy_osystem: ubuntu
      poll_timeout_secs: 300
      power_type: amt
      provisioning_ip: 10.0.12.238
      pxe_mac_address: 38:05:25:31:7f:14
      release_erase: true
      skip_ssh_check: true
      smart_plug_host: 192.168.2.210
      smart_plug_type: tapo
    pwy-home-lab-pkg/_stack/maas/pwy-homelab/machines/ms01-03/commission:
      _unit_purpose: 'Commissioning (ms01-03): MaaS PXE-boots the machine into a minimal environment, discovers hardware (CPUs, RAM, disks, NICs), and records the inventory. Short-circuits if machine is already Ready or beyond. Detects stuck-commissioning (machine powered off while MaaS thinks it is running) and aborts before re-triggering.'
